<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ───────────────────────────────────────────── -->
    <title>Xitter – What's happening?</title>
    <meta name="description" content="Join Xitter – share your thoughts, follow people, and stay on top of what's happening around the world in real time." />
    <meta name="keywords" content="twitter clone, social media, tweets, trending, real-time" />
    <meta name="author" content="Xitter" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://xitter.example.com/" />

    <!-- ── Open Graph ────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Xitter – What's happening?" />
    <meta property="og:description" content="Share your thoughts with the world in real time." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://xitter.example.com/" />
    <meta property="og:site_name" content="Xitter" />

    <!-- ── Twitter Card ──────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Xitter – What's happening?" />
    <meta name="twitter:description" content="Share your thoughts with the world." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- ── Icons ─────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ── Bootstrap Icons ───────────────────────────────────────── -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- ── Theme color ───────────────────────────────────────────── -->
    <meta name="theme-color" content="#000000" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
